[[XSession]]
src = 'Xdefaults'
type = 'dotfile'

[[XSession]]
src = 'xinitrc'
type = 'dotfile'

[[Mercurial]]
src = 'hgrc'
type = 'dotfile'

[[Git]]
src = 'gitconfig'
type = 'dotfile'

[[NVim]]
src = 'nvim' # default 

[[Zsh]]
repo = 'https://github.com/robbyrussell/oh-my-zsh.git'
dest = '~/.oh-my-zsh'

[[Zsh]]
src = 'zshrc'
type = 'dotfile'

[[MPV]]
src = 'mpv'
target = '${XDG_CONFIG_HOME}'

[[TMux]]
src = 'tmux'

[[Hypr]]
src = 'hypr'
type = 'copy' # hyprland doesn't like copy

[[Waybar]]
src = 'waybar'

[[Wezterm]]
src = 'wezterm'

[[Ghostty]]
src = 'ghostty'

[[Mako]]
src = 'mako'


[[ClangFormat]]
src = 'clang-format'
type = 'dotfile'

[[Clangd]]
src = 'clangd'
target = '${XDG_CONFIG_HOME}'

# Cursor theme: Bibata-Original-Classic
# https://github.com/ful1e5/Bibata_Cursor
# The cursor theme files (~/.local/share/icons/Bibata-Original-Classic/)
# are not tracked here — install manually or scp from another machine.
# The entries below configure GTK and X11 fallback to use the theme.

[[Cursor]]
src = 'icons-default'
dest = '~/.icons/default'

[[GTK]]
src = 'gtk-3.0'
target = '${XDG_CONFIG_HOME}'
# NOTE: gtk-xft-dpi is screen-specific; omitted from tracked file

[[GTK]]
src = 'gtk-4.0'
target = '${XDG_CONFIG_HOME}'
# NOTE: gtk-xft-dpi is screen-specific; omitted from tracked file
