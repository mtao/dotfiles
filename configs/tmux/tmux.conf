## set the default TERM — always use 256color so programs inside tmux get proper color support
set -g default-terminal tmux-256color

## enable 24-bit (truecolor) passthrough for modern terminals
set -ga terminal-features ",xterm-ghostty:RGB"
set -ga terminal-features ",xterm-256color:RGB"
set -ga terminal-features ",xterm-kitty:RGB"

set -g mouse

## update the TERM variable of terminal emulator when creating a new session or attaching a existing session
set -g update-environment 'DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM'

set -g mouse

# use a nice theme
run-shell "~/.config/tmux/tmux-power/tmux-power.tmux"
